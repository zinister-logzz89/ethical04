<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="form-title">Contact Form</h1>
        
        <div id="alert" class="alert" style="display: none;"></div>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message (Optional)</label>
                <textarea id="message" name="message" placeholder="Enter your message here..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                Send Message
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Sending message...</p>
            </div>
        </form>
    </div>

    <script>
        class ContactForm {
            constructor() {
                this.form = document.getElementById('contactForm');
                this.submitBtn = document.getElementById('submitBtn');
                this.loading = document.getElementById('loading');
                this.alert = document.getElementById('alert');
                this.csrfToken = null;
                
                this.init();
            }

            async init() {
                await this.getCsrfToken();
                this.bindEvents();
            }

            async getCsrfToken() {
                try {
                    const response = await fetch('api/csrf-token.php');
                    const data = await response.json();
                    this.csrfToken = data.token;
                } catch (error) {
                    console.error('Failed to get CSRF token:', error);
                }
            }

            bindEvents() {
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                if (!this.csrfToken) {
                    this.showAlert('Security token not available. Please refresh the page.', 'error');
                    return;
                }

                this.setLoading(true);
                this.hideAlert();

                const formData = new FormData(this.form);
                formData.append('csrf_token', this.csrfToken);

                try {
                    const response = await fetch('api/contact.php', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });

                    const data = await response.json();

                    if (data.success) {
                        this.showAlert(data.message, 'success');
                        this.form.reset();
                        // Get new CSRF token for next submission
                        await this.getCsrfToken();
                    } else {
                        this.showAlert(data.message, 'error');
                    }
                } catch (error) {
                    this.showAlert('Network error. Please try again.', 'error');
                    console.error('Form submission error:', error);
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(isLoading) {
                this.submitBtn.disabled = isLoading;
                this.loading.style.display = isLoading ? 'block' : 'none';
                this.submitBtn.textContent = isLoading ? 'Sending...' : 'Send Message';
            }

            showAlert(message, type) {
                this.alert.textContent = message;
                this.alert.className = `alert alert-${type}`;
                this.alert.style.display = 'block';
                
                // Auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => this.hideAlert(), 5000);
                }
            }

            hideAlert() {
                this.alert.style.display = 'none';
            }
        }

        // Initialize the contact form when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new ContactForm();
        });
    </script>
</body>
</html>
